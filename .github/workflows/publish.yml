# Publish the committed release wheel to PyPI via Trusted Publishing (OIDC — no token).
# Triggered by pushing a v* tag. The wheel in dist/ is the PGO release build produced
# by benchmarks/pgo-build.sh (see that script for the build provenance).
name: publish

on:
  push:
    tags: ["v*"]

jobs:
  # The wheel is abi3 built once on a NEW Python — nothing else ever imports it
  # on 3.9, so the floor claim must be proven here before anything publishes.
  smoke-py39:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Wheel imports on the oldest supported Python
        run: |
          pip install dist/*.whl
          python -c "import apitap; print('py3.9 import ok', apitap.__version__)"

      # The PyPI project page renders py-apitap/README.md — a DIFFERENT file from
      # the repo root README. It silently drifted ~8 releases once (the page still
      # advertised 4 routes when 25 were wired). This gate makes that impossible:
      # every scheme in the route table must appear on the page we publish.
      - name: PyPI README lists every route scheme
        run: |
          schemes=$(grep -oE '"[a-z+]+" *-> *"[a-z+]+"' crates/apitap-core/src/pipeline/dispatch.rs \
            | tr -d '"' | sed 's/ *-> */\n/' | sort -u)
          missing=""
          for s in $schemes; do
            grep -q -- "$s://" py-apitap/README.md || missing="$missing $s"
          done
          if [ -n "$missing" ]; then
            echo "py-apitap/README.md (the PyPI page) never mentions:$missing"
            exit 1
          fi
          echo "PyPI README covers every route scheme:"; echo "$schemes" | tr '\n' ' '; echo

  pypi:
    needs: smoke-py39
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Show what will be published
        run: ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
